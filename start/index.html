<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start a workout — PlusPlus (++)</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='72' font-family='monospace' font-weight='bold' fill='%2346d17c'>+</text></svg>">
  <style>
    .routine-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-top: 24px; }
    .routine-card h1 { font-size: 26px; margin: 0; }
    .routine-card .meta { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--text-2); margin-top: 6px; }
    .open-cta { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <header class="site">
    <a class="mark" href="/">++</a>
    <nav>
      <a href="/docs/">docs</a>
      <a href="https://github.com/plusplusinc/plusplus">github</a>
    </nav>
  </header>

  <main>
    <p class="caption" style="margin-top:26px">a scheduled workout from your calendar</p>
    <div class="routine-card">
      <h1 id="routine-name">Your workout</h1>
      <div class="meta">tap below to open it in PlusPlus</div>
    </div>
    <div class="open-cta">
      <a class="btn primary" id="open-app" href="#">Open in PlusPlus</a>
      <a class="btn ghost" href="/">Get PlusPlus — beta on TestFlight</a>
      <p class="caption">this link only opens the app — nothing is sent anywhere</p>
    </div>
  </main>

  <footer>
    <span>++ · plusplus.fit</span>
    <span><a href="/privacy/">privacy</a> · <a href="/docs/">docs</a></span>
  </footer>

  <script>
  (function () {
    // Path is /start/<encoded-name>[/]. Pull the name segment out and
    // decode it; if there isn't one, keep the generic copy.
    var parts = location.pathname.split('/').filter(Boolean);
    var idx = parts.indexOf('start');
    var encoded = (idx >= 0 && parts.length > idx + 1) ? parts[idx + 1] : '';
    var name = '';
    try { name = decodeURIComponent(encoded); } catch (e) { name = encoded; }

    if (name) {
      var el = document.getElementById('routine-name');
      el.textContent = name;
      document.title = name + ' — PlusPlus (++)';
    }
    // The custom scheme is the reliable opener from a browser tab; the
    // universal link already gave installed apps first crack.
    document.getElementById('open-app').href = 'plusplus://start/' + encoded;
  })();
  </script>
</body>
</html>
